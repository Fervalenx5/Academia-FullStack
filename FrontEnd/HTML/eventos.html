<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia - Eventos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="dashboard-body">

  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="./dashboard.html">Academia Admin</a>
      <div class="d-flex gap-2">
        <a href="./dashboard.html" class="btn btn-light btn-sm">Volver al panel</a>
        <a href="./index.html" class="btn btn-light btn-sm">Cerrar sesión</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div>
        <h1 class="fw-bold mb-1">Eventos</h1>
        <p class="text-muted mb-0">Gestión y consulta de eventos académicos</p>
      </div>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalEvento">
        + Nuevo evento
      </button>
    </div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3 align-items-end">
        <div class="col-md-8">
          <label for="filtroOrientado" class="form-label">Filtrar eventos por orientado</label>
            <select class="form-select" id="filtroOrientado">
             <option value="">Todos los orientados</option>
            </select>
        </div>

          <div class="col-md-4 d-grid">
            <button class="btn btn-outline-secondary" id="btnLimpiarFiltro">Limpiar filtro</button>
          </div>
      </div>
    </div>
  </div>  

    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Duración</th>
                <th>Orientador</th>
                <th>Orientados</th>
                <th>Detalle</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaEventos">
              <tr>
                <td colspan="8" class="text-center text-muted">Cargando eventos...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalEvento" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header">
          <h5 class="modal-title">Alta de evento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form id="formEvento">
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre del evento</label>
                <input type="text" class="form-control" id="nombreEvento" required maxlength="200">
              </div>

              <div class="col-md-6">
                <label class="form-label">Orientador</label>
                <select class="form-select" id="orientadorId" required>
                  <option value="">Seleccionar orientador</option>
                </select>
              </div>

              <div class="col-12">
              <label class="form-label">Orientados participantes</label>

              <div id="listaOrientados" class="border rounded p-3"></div>

              </div>

              <div class="col-md-4">
                <label class="form-label">Fecha</label>
                <input type="date" class="form-control" id="fecha" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Hora</label>
                <input type="time" class="form-control" id="hora" required>
              </div>

              <div class="col-md-4">
                <label class="form-label">Duración (minutos)</label>
                <input type="number" class="form-control" id="duracion" required>
              </div>

              <div class="col-12">
                <label class="form-label">Detalle</label>
                <textarea class="form-control" id="detalle" rows="3" maxlength="500"></textarea>
              </div>
            </div>

            <div id="mensajeEvento" class="mt-3"></div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar evento</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/eventos.js"></script>
</body>
</html>
