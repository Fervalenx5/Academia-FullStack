<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="login-body">

  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow-lg border-0 login-card p-4">
      <div class="text-center mb-4">
        <h2 class="fw-bold">Portal Privado</h2>
        <p class="text-muted">Ingresá con tu usuario administrador</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Correo</label>
          <input type="email" class="form-control" id="email" placeholder="admin@academia.com" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="password" placeholder="********" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Ingresar</button>
      </form>

      <div class="text-center mt-3">
        <a href="./index.html" class="text-decoration-none">← Volver al inicio</a>
      </div>
    </div>
  </div>

  <script>
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    const adminEmail = "admin@academia.com";
    const adminPassword = "1234";

    const mensajeViejo = document.getElementById("mensajeLogin");
    if (mensajeViejo) mensajeViejo.remove();

    if (email === adminEmail && password === adminPassword) {
      localStorage.setItem("adminLogueado", "true");
      localStorage.setItem("adminEmail", email);
      localStorage.setItem("adminNombre", "Administrador");
      window.location.href = "./dashboard.html";
    } else {
      const mensaje = document.createElement("div");
      mensaje.id = "mensajeLogin";
      mensaje.className = "alert alert-danger mt-3 mb-0";
      mensaje.textContent = "Credenciales incorrectas.";
      form.appendChild(mensaje);
    }
  });
</script>
</body>
</html>
