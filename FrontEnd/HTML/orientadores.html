<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia - Orientadores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="dashboard-body">

  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="./dashboard.html">
        <img src="./logo.png" alt="Logo">
        <span>Admin</span>
      </a>
      <div class="d-flex gap-2">
        <a href="./dashboard.html" class="btn btn-light btn-sm">Volver al panel</a>
        <a href="./index.html" class="btn btn-light btn-sm">Cerrar sesión</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <div>
        <h1 class="fw-bold mb-1">Orientadores</h1>
        <p class="text-muted mb-0">Gestión y consulta de orientadores disponibles</p>
      </div>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalOrientador">
        + Nuevo orientador
      </button>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead>
              <tr>
                <th>Nombre y apellido</th>
                <th>Especialidad</th>
                <th>Email</th>
              </tr>
            </thead>
            <tbody id="tablaOrientadores">
              <tr>
                <td colspan="3" class="text-center text-muted">Cargando orientadores...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="modalOrientador" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content border-0">
        <div class="modal-header">
          <h5 class="modal-title">Alta de orientador</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <form id="formOrientador">
          <div class="modal-body">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Nombre y apellido</label>
                <input type="text" class="form-control" id="nombreApellidoOrientador" required maxlength="500">
              </div>

              <div class="col-12">
                <label class="form-label">Especialidad</label>
                <input type="text" class="form-control" id="especialidadOrientador" maxlength="255">
              </div>

              <div class="col-12">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="emailOrientador" required maxlength="255">
              </div>
            </div>

            <div id="mensajeOrientador" class="mt-3"></div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar orientador</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/orientadores.js"></script>
</body>
</html>
