<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia - Perfil</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="dashboard-body">

  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold" href="./dashboard.html">Academia Admin</a>
      <div class="d-flex gap-2">
        <a href="./dashboard.html" class="btn btn-light btn-sm">Volver al panel</a>
        <button id="btnLogout" class="btn btn-light btn-sm">Cerrar sesión</button>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="mb-4">
      <h1 class="fw-bold mb-1">Perfil del usuario</h1>
      <p class="text-muted mb-0">Visualización de los datos del administrador logueado</p>
    </div>

    <div class="card border-0 shadow-sm perfil-card">
      <div class="card-body p-4">
        <div class="row g-4">
          <div class="col-md-6">
            <div class="perfil-item">
              <label class="form-label fw-semibold">Nombre</label>
              <div class="form-control bg-light" id="perfilNombre">-</div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="perfil-item">
              <label class="form-label fw-semibold">Email</label>
              <div class="form-control bg-light" id="perfilEmail">-</div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="perfil-item">
              <label class="form-label fw-semibold">Rol</label>
              <div class="form-control bg-light" id="perfilRol">Administrador</div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="perfil-item">
              <label class="form-label fw-semibold">Estado de sesión</label>
              <div class="form-control bg-light text-success fw-semibold" id="perfilEstado">Activa</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const adminLogueado = localStorage.getItem("adminLogueado");

    if (adminLogueado !== "true") {
      window.location.href = "./login.html";
    }

    const nombre = localStorage.getItem("adminNombre") || "Administrador";
    const email = localStorage.getItem("adminEmail") || "admin@academia.com";

    document.getElementById("perfilNombre").textContent = nombre;
    document.getElementById("perfilEmail").textContent = email;

    const btnLogout = document.getElementById("btnLogout");
    btnLogout.addEventListener("click", () => {
      localStorage.removeItem("adminLogueado");
      localStorage.removeItem("adminEmail");
      localStorage.removeItem("adminNombre");
      window.location.href = "./index.html";
    });
  </script>

</body>
</html>
